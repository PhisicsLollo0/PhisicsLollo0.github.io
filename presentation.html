<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Presentation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .pdf-container {
            width: 80%;
            height: 600px;
            margin: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>Paper Presentation</h1>
    <p>Below is the PDF presentation of our paper.</p>

    <div class="pdf-container">
        <!-- Embed PDF here -->
        <iframe src="paper_presentation.pdf" frameborder="0"></iframe>
    </div>
</body>
</html>
